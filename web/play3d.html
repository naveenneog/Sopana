<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Snake &amp; Ladders — Original (3D)</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0a0603" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0603; font-family: Georgia, 'Noto Serif', serif; color: #f4e6cd; -webkit-text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }
      button, select, a { touch-action: manipulation; }
      nav { margin-top: env(safe-area-inset-top, 0px); }
      nav a { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
      #stage { position: fixed; inset: 0; }
      #stage canvas { display: block; }
      #title { position: fixed; top: 1.1rem; left: 0; right: 0; text-align: center; font-size: 1.4rem; letter-spacing: 0.1em; color: #e8a33d; text-shadow: 0 0 20px rgba(232, 163, 61, 0.6); pointer-events: none; }
      #status { position: fixed; top: 2.9rem; left: 0; right: 0; text-align: center; font-size: 0.95rem; color: #d9c39c; text-shadow: 0 2px 6px #000; pointer-events: none; }
      #hud { position: fixed; left: 0; right: 0; bottom: 0; display: flex; gap: 0.8rem; align-items: center; justify-content: center; padding: 1.1rem; padding-bottom: calc(1.1rem + env(safe-area-inset-bottom, 0px)); flex-wrap: wrap; background: linear-gradient(to top, rgba(10, 6, 3, 0.92) 45%, rgba(10, 6, 3, 0)); }
      #hud button, #hud select { font: inherit; color: #f4e6cd; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(232, 163, 61, 0.4); border-radius: 12px; padding: 0.75rem 1rem; cursor: pointer; min-height: 46px; display: inline-flex; align-items: center; }
      #hud select option { color: #111; }
      #roll { font-weight: bold; font-size: 1.1rem; color: #241200 !important; background: linear-gradient(180deg, #ffcf7a, #e8a33d) !important; border: 0 !important; padding: 0.8rem 1.7rem !important; box-shadow: 0 6px 20px rgba(232, 163, 61, 0.4); }
      #roll:disabled { opacity: 0.5; }
      #card { position: fixed; left: 50%; bottom: 6rem; transform: translateX(-50%) translateY(20px); width: min(90vw, 460px); background: linear-gradient(180deg, #231208, #160c05); border: 1px solid rgba(232, 163, 61, 0.45); border-radius: 16px; padding: 1rem 1.2rem; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); text-align: center; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
      #card.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #card .kind { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.15rem 0.6rem; border-radius: 999px; background: #d9b64e; color: #1a0d04; }
      #card .kind.snake { background: #c0392b; color: #fff; }
      #card h2 { margin: 0.5rem 0 0.1rem; font-size: 1.5rem; }
      #card .en { color: #b79b74; font-style: italic; margin: 0; }
      #card .m { margin: 0.6rem 0 0; font-size: 1.04rem; line-height: 1.5; }
      #hint { position: fixed; left: 0; right: 0; bottom: 4.6rem; text-align: center; font-size: 0.72rem; color: #8a745a; pointer-events: none; }
      @media (max-width: 640px) {
        #title { display: none; }
        #status { top: calc(4.8rem + env(safe-area-inset-top, 0px)); font-size: 0.9rem; }
        #hint { display: none; }
        #card { bottom: 11.5rem; }
      }
    </style>
  </head>
  <body>
    <nav style="position:fixed;top:.6rem;left:.6rem;z-index:70;display:flex;gap:.3rem">
      <a href="setup.html" style="font:inherit;font-size:.8rem;color:#f4e6cd;background:rgba(0,0,0,.42);border:1px solid rgba(232,163,61,.35);border-radius:8px;padding:.3rem .6rem;text-decoration:none">⚙ Lobby</a>
      <a href="cinematic.html" style="font:inherit;font-size:.8rem;color:#f4e6cd;background:rgba(0,0,0,.42);border:1px solid rgba(232,163,61,.35);border-radius:8px;padding:.3rem .6rem;text-decoration:none">Cinematic</a>
      <a href="board.html" style="font:inherit;font-size:.8rem;color:#f4e6cd;background:rgba(0,0,0,.42);border:1px solid rgba(232,163,61,.35);border-radius:8px;padding:.3rem .6rem;text-decoration:none">Board</a>
      <a href="play3d.html" style="font:inherit;font-size:.8rem;color:#241200;background:#e8a33d;border:1px solid rgba(232,163,61,.5);border-radius:8px;padding:.3rem .6rem;text-decoration:none">3D</a>
    </nav>
    <div id="stage"></div>
    <div id="title">Snake &amp; Ladders — Original</div>
    <div id="status">Roll to play</div>
    <div id="hint">drag to orbit · scroll to zoom · 🎥 to shift the camera</div>
    <div id="card"><span id="cKind" class="kind"></span><h2 id="cName"></h2><p class="en" id="cEn"></p><p class="m" id="cMeaning"></p></div>
    <div id="hud">
      <button id="roll">Roll</button>
      <button id="restart" style="display: none;">↻ Again</button>
      <span id="p3dturn" style="display:none;align-items:center;gap:.4rem;font:inherit;color:#f4e6cd;background:rgba(0,0,0,.4);border:1px solid rgba(232,163,61,.35);border-radius:10px;padding:.45rem .7rem"></span>
      <select id="worldSel" title="Theme"></select>
      <button id="viewBtn">🎥 <span id="viewName">Isometric</span></button>
      <button id="muteBtn" title="Sound on/off">🔊</button>
    </div>
    <script type="module" src="js/play3d.js"></script>
  </body>
</html>
