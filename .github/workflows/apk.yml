name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the APK (e.g. v1.0.0)"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install --no-save @capacitor/cli@7 @capacitor/core@7 @capacitor/android@7

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon + splash from assets/
        run: |
          npm install --no-save @capacitor/assets@3
          npx @capacitor/assets generate --android --iconBackgroundColor '#0a0603' --iconBackgroundColorDark '#0a0603' --splashBackgroundColor '#0a0603' --splashBackgroundColorDark '#0a0603'

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Name the APK
        id: name
        run: |
          VER="${{ github.event.release.tag_name || github.event.inputs.version || 'dev' }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "Sopana-${VER}.apk"
          # Stable-named copy so the landing page can link to a permanent "latest" URL:
          # https://github.com/naveenneog/Sopana/releases/latest/download/Sopana.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "Sopana.apk"
          echo "apk=Sopana-${VER}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sopana-apk
          path: Sopana*.apk

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.version }}
          files: |
            Sopana-*.apk
            Sopana.apk
